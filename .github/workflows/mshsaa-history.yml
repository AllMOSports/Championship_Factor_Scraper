name: MSHSAA History Scrape
 
on:
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
 
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Debug - list repo contents
        run: find . -maxdepth 3 -type f
 
      - name: Install dependencies
        run: pip install requests beautifulsoup4
 
      - name: Run scraper
        run: |
          cd mshsaa-history
          python scrape_mshsaa_history.py --input teams_to_scrape.csv --output history_results.json
 
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mshsaa-history/history_results.json
          git diff --staged --quiet || git commit -m "Update MSHSAA history results"
          git push
